spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/travel
    username: travel_user
    password: test
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        enable_lazy_load_no_trans: true
    open-in-view: false
  flyway:
    user: postgres
    password: test
  thymeleaf:
    cache: false
  redis:
    host: localhost
    port: 6379
  mail:
    host: smtp.example.com
    port: 587
    username: mail_user
    password: mail_pass
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework.security: info
